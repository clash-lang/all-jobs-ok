name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  major-tag:
    name: Move the major version tag
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Point the major version tag at this release
        run: |
          tag="${{ github.event.release.tag_name }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag '${tag}' is not of the form vX.Y.Z; not moving a major tag"
            exit 1
          fi
          major="${tag%%.*}"
          git tag -f "${major}" "${GITHUB_SHA}"
          git push -f origin "${major}"
