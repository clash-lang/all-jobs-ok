version = 1
SPDX-PackageName = "all-ok"
SPDX-PackageSupplier = "QBayLogic B.V. <devops@qbaylogic.com>"
SPDX-PackageDownloadLocation = "https://github.com/clash-lang/all-ok"

[[annotations]]
path = [
    ".gitignore",
    ".prettierignore",
    ".prettierrc.json",
    "README.md",
    "flake.lock",
    "package-lock.json",
    "package.json",
    "src/__fixtures__/broken.yml",
    "src/__fixtures__/ok.yml",
    "tsconfig.json",
]
SPDX-FileCopyrightText = "2026 QBayLogic B.V."
SPDX-License-Identifier = "CC0-1.0"

# The bundle contains our own code plus the bundled npm dependencies
# @actions/core (MIT) and yaml (ISC).
[[annotations]]
path = ["dist/index.js"]
precedence = "override"
SPDX-FileCopyrightText = [
    "2026 QBayLogic B.V.",
    "GitHub, Inc. and contributors (@actions/core)",
    "Eemeli Aro and contributors (yaml)",
]
SPDX-License-Identifier = "BSD-2-Clause AND MIT AND ISC"
