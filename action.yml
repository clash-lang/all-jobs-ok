name: "all-jobs-ok"
description: >-
  Require all jobs to pass CI
author: "QBayLogic B.V."
branding:
  icon: check-circle
  color: green

inputs:
  workflow-file:
    description: >-
      Path to the workflow file to check, relative to the repository root.
      Defaults to the workflow file of the current run. The repository must
      be checked out (actions/checkout) for the file to be readable.
    required: false
    default: ""
  exclude:
    description: >-
      Newline-separated job ids that must NOT be listed in 'all.needs', e.g.
      jobs that run after the 'all' job to react to its result.
    required: false
    default: ""

runs:
  using: node20
  main: dist/index.js
